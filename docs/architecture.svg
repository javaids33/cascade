<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 600" width="1080" height="600" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrwb" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9333ea"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="4" y="4" width="1072" height="592" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- title -->
  <text x="540" y="42" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">cascade — one embedded engine for the edge data stack</text>
  <text x="540" y="64" text-anchor="middle" font-size="12.5" fill="#475569">edge OLTP&#160;&#160;+&#160;&#160;CDC&#160;&#160;+&#160;&#160;native replication&#160;&#160;+&#160;&#160;co-located vectors&#160;&#160;&#8212;&#160;&#160;all in one Turso file</text>

  <!-- write-back (out-of-band) path: edge outbox -> master /inbox -->
  <path d="M915 112 V86 H380 V116" fill="none" stroke="#9333ea" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrwb)"/>
  <text x="640" y="80" text-anchor="middle" font-size="10.5" font-style="italic" fill="#9333ea">write-back &#183; outbox &#8594; POST /inbox  (out-of-band; sync is one-way)</text>

  <!-- flow arrows -->
  <path d="M188 182 H246" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M502 182 H562" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M718 176 L782 142" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M718 188 L782 214" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M375 244 V316" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <text x="532" y="174" text-anchor="middle" font-size="10.5" font-style="italic" fill="#64748b">native sync</text>
  <text x="752" y="150" text-anchor="middle" font-size="10.5" font-style="italic" fill="#64748b">pull() &#183; 1&#8594;N</text>
  <text x="388" y="286" text-anchor="start" font-size="10.5" font-style="italic" fill="#64748b">CDC drain (change_id cursor)</text>

  <!-- Source -->
  <rect x="36" y="140" width="150" height="84" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="111" y="176" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Source / firehose</text>
  <text x="111" y="198" text-anchor="middle" font-size="11" fill="#475569">wikimedia &#183; hn &#183; put()</text>

  <!-- Master -->
  <rect x="250" y="120" width="250" height="124" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.8"/>
  <text x="375" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#3730a3">MASTER &#183; Turso (GPU)</text>
  <text x="375" y="176" text-anchor="middle" font-size="11.5" fill="#1e293b">embed once (Ollama / GPU)</text>
  <text x="375" y="200" text-anchor="middle" font-size="11.5" fill="#1e293b">docs + doc_vectors</text>
  <text x="375" y="224" text-anchor="middle" font-size="11.5" fill="#1e293b">CDC capture &#8594; turso_cdc</text>

  <!-- Sync hub -->
  <rect x="566" y="140" width="150" height="84" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.8"/>
  <text x="641" y="170" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">Sync hub :8080</text>
  <text x="641" y="190" text-anchor="middle" font-size="10.5" fill="#475569">tursodb --sync-server</text>
  <text x="641" y="208" text-anchor="middle" font-size="10.5" fill="#475569">push() / pull() (WAL)</text>

  <!-- Edge A -->
  <rect x="786" y="112" width="258" height="58" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.8"/>
  <text x="915" y="135" text-anchor="middle" font-size="13.5" font-weight="700" fill="#047857">EDGE A &#183; CPU (no GPU)</text>
  <text x="915" y="155" text-anchor="middle" font-size="10.5" fill="#1e293b">pull() &#8594; vector search &#183; brute / HNSW</text>

  <!-- Edge B -->
  <rect x="786" y="186" width="258" height="58" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.8"/>
  <text x="915" y="209" text-anchor="middle" font-size="13.5" font-weight="700" fill="#047857">EDGE B &#183; CPU</text>
  <text x="915" y="229" text-anchor="middle" font-size="10.5" fill="#1e293b">pull() &#8594; co-located search + RAG</text>

  <!-- OLAP / lakehouse -->
  <rect x="250" y="320" width="250" height="96" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="375" y="348" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">CDC drain &#8594; OLAP / lakehouse</text>
  <text x="375" y="372" text-anchor="middle" font-size="11.5" fill="#1e293b">DuckDB &#183; Apache Iceberg</text>
  <text x="375" y="394" text-anchor="middle" font-size="11" fill="#475569">webhook &#183; jsonl (broker-free change feed)</text>

  <!-- pluggable-sink hint arrow from OLAP to a small note -->
  <path d="M500 368 H560" fill="none" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="566" y="358" text-anchor="start" font-size="10.5" fill="#6d28d9">pluggable sinks</text>
  <text x="566" y="376" text-anchor="start" font-size="10" fill="#64748b">analytics never touches the</text>
  <text x="566" y="390" text-anchor="start" font-size="10" fill="#64748b">live edge OLTP</text>

  <!-- divider -->
  <line x1="36" y1="466" x2="1044" y2="466" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- replaces caption -->
  <text x="540" y="496" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Collapses six services into one embedded file</text>
  <text x="540" y="522" text-anchor="middle" font-size="11.5" fill="#475569">Postgres read-replicas + Litestream&#160;&#160;&#183;&#160;&#160;Debezium + Kafka&#160;&#160;&#183;&#160;&#160;Pinecone / pgvector&#160;&#160;&#183;&#160;&#160;per-node embedding&#160;&#160;&#183;&#160;&#160;bespoke Iceberg ETL</text>

  <!-- legend -->
  <g font-size="10.5" fill="#475569">
    <rect x="300" y="548" width="14" height="11" rx="2" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="320" y="558">master (writes/embeds)</text>
    <rect x="470" y="548" width="14" height="11" rx="2" fill="#ecfdf5" stroke="#059669"/>
    <text x="490" y="558">edge replica (read + search)</text>
    <rect x="680" y="548" width="14" height="11" rx="2" fill="#f5f3ff" stroke="#7c3aed"/>
    <text x="700" y="558">analytics lane</text>
  </g>
</svg>
