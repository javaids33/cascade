# PC master: sync-server hub + continuous serve (ingest + embed + CDC + push).
# Run from the repo root:  docker compose -f docker/docker-compose.master.yml up --build
#
# Ollama runs on the host with the GPU; containers reach it at host.docker.internal:11434
# (baked into configs/master.docker.toml). The hub publishes 8080 — point the Mac edge at
# http://<this-PC-ip>:8080 (Tailscale/LAN). For the OLAP lane, run a one-off drain:
#   docker compose -f docker/docker-compose.master.yml run --rm serve drain --config configs/master.docker.toml

services:
  hub:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint: ["tursodb", "/work/.work/db/lab_hub.db", "--sync-server", "0.0.0.0:8080"]
    ports:
      - "8080:8080"
    volumes:
      - ../.work:/work/.work
    extra_hosts:
      - "host.docker.internal:host-gateway"

  serve:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on: [hub]
    command: ["serve", "--config", "configs/master.docker.toml"]
    volumes:
      - ../.work:/work/.work
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
