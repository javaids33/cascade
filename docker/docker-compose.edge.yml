# Mac edge: run search/RAG queries against the replicated edge db, pulling from the PC's sync hub.
# Set PC_IP to the PC's Tailscale/LAN IP, then:
#   PC_IP=100.x.y.z docker compose -f docker/docker-compose.edge.yml run --rm edge \
#       search "what are the recent edits about science?" 5 --config configs/replica.docker.toml
#
# CASCADE_REMOTE_URL overrides sync.remote_url in the config, so the committed toml stays generic.
# Ollama runs on the Mac host (Metal); the container reaches it at host.docker.internal:11434.

services:
  edge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      CASCADE_REMOTE_URL: "http://${PC_IP:?set PC_IP to the PC sync-server ip}:8080"
    volumes:
      - ../.work:/work/.work
    extra_hosts:
      - "host.docker.internal:host-gateway"
